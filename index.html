<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Phonics Buddy — Grade 1 Reading Friend</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --p-pink: #ff8fb8;
    --p-pink-bright: #ffb1cd;
    --p-pink-dark: #e0608a;
    --p-blue: #5ac0ee;
    --p-blue-bright: #88d6f6;
    --p-blue-dark: #2a8cc0;
    --p-yellow: #ffd84a;
    --p-yellow-bright: #ffea8a;
    --p-yellow-dark: #e0b020;
    --p-green: #7ed16a;
    --p-green-bright: #a8e09a;
    --p-green-dark: #4a9f3a;
    --p-purple: #b48aef;
    --p-purple-bright: #d0b4f8;
    --p-purple-dark: #8260c8;
    --p-orange: #ff9f5a;
    --p-orange-bright: #ffbb88;
    --p-orange-dark: #d8702a;
    --p-cream: #fffbf0;
    --p-text: #3a3050;
    --p-text-light: #6a6080;
    --p-success: #4a9f3a;
    --p-fail: #e85060;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Fredoka', 'Comic Sans MS', sans-serif;
    background: linear-gradient(135deg, #ffe8f0 0%, #e0f4ff 50%, #fff5d8 100%);
    color: var(--p-text);
    overflow: hidden;
    background-attachment: fixed;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 900px;
    margin: 0 auto;
    background: var(--p-cream);
    border-left: 3px solid #ffd0e0;
    border-right: 3px solid #ffd0e0;
    box-shadow: 0 0 32px rgba(255,143,184,0.18);
    position: relative;
  }
  header {
    background: linear-gradient(135deg, var(--p-pink-bright) 0%, var(--p-yellow-bright) 50%, var(--p-blue-bright) 100%);
    color: var(--p-text);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px dashed #ffc0d8;
    box-shadow: 0 3px 12px rgba(255,143,184,0.25);
    z-index: 5;
    position: relative;
    gap: 10px;
  }
  header h1 {
    font-family: 'Baloo 2', 'Fredoka', sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 10px;
    color: #fff;
    text-shadow: 2px 2px 0 var(--p-pink-dark), -1px -1px 0 var(--p-pink-dark), 1px -1px 0 var(--p-pink-dark), -1px 1px 0 var(--p-pink-dark);
    flex: 1;
    justify-content: center;
    flex-wrap: wrap;
  }
  .owl-avatar {
    font-size: 2rem;
    animation: bounce 2s ease-in-out infinite;
    display: inline-block;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-5px) rotate(5deg); }
  }
  #unit-badge {
    display: none;
    padding: 5px 12px;
    background: #fff;
    border: 2px solid var(--p-pink);
    border-radius: 14px;
    font-family: 'Baloo 2', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--p-pink-dark);
    white-space: nowrap;
    flex-shrink: 0;
    box-shadow: 0 2px 0 var(--p-pink-dark);
  }
  #scoreboard {
    background: #fff;
    color: var(--p-yellow-dark);
    padding: 6px 14px;
    border: 2px solid var(--p-yellow-dark);
    border-radius: 14px;
    font-family: 'Baloo 2', sans-serif;
    font-size: 0.9rem;
    font-weight: 800;
    box-shadow: 0 2px 0 var(--p-yellow-dark);
    transition: transform 0.25s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  #log-btn, #print-btn {
    background: #fff;
    padding: 6px 12px;
    border: 2px solid var(--p-purple);
    border-radius: 14px;
    font-family: 'Baloo 2', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: all 0.2s;
    color: var(--p-purple-dark);
    box-shadow: 0 2px 0 var(--p-purple-dark);
  }
  #print-btn { border-color: var(--p-blue); color: var(--p-blue-dark); box-shadow: 0 2px 0 var(--p-blue-dark); }
  #log-btn:hover, #print-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 0 var(--p-purple-dark);
  }
  #print-btn:hover { box-shadow: 0 4px 0 var(--p-blue-dark); }

  /* Overlays */
  #log-overlay, #print-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(80,50,90,0.55);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #log-overlay.open, #print-overlay.open { display: flex; }
  #log-panel, #print-panel {
    background: var(--p-cream);
    width: 100%;
    max-width: 760px;
    max-height: 88vh;
    border: 4px solid var(--p-pink);
    border-radius: 20px;
    box-shadow: 0 12px 40px rgba(80,40,90,0.35);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #print-panel { border-color: var(--p-blue); }
  #log-header, #print-header {
    background: var(--p-pink-bright);
    border-bottom: 3px dashed #fff;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  #print-header { background: var(--p-blue-bright); }
  #log-header h2, #print-header h2 {
    font-family: 'Baloo 2', sans-serif;
    font-size: 1.15rem;
    font-weight: 800;
    color: #fff;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.18);
    margin: 0;
  }
  #log-close, #print-close {
    background: #fff;
    border: 2px solid #fff;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    color: var(--p-pink-dark);
    transition: all 0.2s;
  }
  #print-close { color: var(--p-blue-dark); }
  #log-close:hover, #print-close:hover {
    transform: rotate(90deg) scale(1.05);
  }
  #log-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    padding: 16px 18px;
    background: #fff8f0;
    border-bottom: 2px dashed #ffd6e2;
    flex-shrink: 0;
  }
  .log-stat {
    background: #fff;
    border: 2.5px solid var(--p-yellow);
    border-radius: 14px;
    padding: 12px 6px;
    text-align: center;
    box-shadow: 0 3px 0 var(--p-yellow-dark);
  }
  .log-stat-num {
    display: block;
    font-family: 'Baloo 2', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--p-pink-dark);
    line-height: 1.1;
  }
  .log-stat-label {
    display: block;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--p-text-light);
    margin-top: 4px;
  }
  #log-body, #print-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 18px;
    background: var(--p-cream);
  }
  .log-entry {
    padding: 9px 13px;
    margin-bottom: 9px;
    border-radius: 12px;
    font-size: 1rem;
    line-height: 1.5;
    border-left: 4px solid #ddd;
    background: #fff;
  }
  .log-entry.bot { border-left-color: var(--p-blue); background: #f0fafe; }
  .log-entry.user { border-left-color: var(--p-pink); background: #fff5fa; }
  .log-entry.correct { border-left-color: var(--p-success); background: #f0fbe8; }
  .log-entry.wrong { border-left-color: var(--p-fail); background: #fff0f2; }
  .log-entry.system { border-left-color: var(--p-text-light); background: #f5f0fa; font-style: italic; }
  .log-time {
    display: inline-block;
    font-family: 'Baloo 2', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--p-text-light);
    margin-right: 8px;
  }
  .log-tag {
    display: inline-block;
    font-family: 'Baloo 2', sans-serif;
    font-size: 0.7rem;
    font-weight: 800;
    padding: 2px 8px;
    border-radius: 8px;
    margin-right: 6px;
    color: #fff;
    vertical-align: middle;
  }
  .log-tag.bot { background: var(--p-blue); }
  .log-tag.user { background: var(--p-pink); }
  .log-tag.correct { background: var(--p-success); }
  .log-tag.wrong { background: var(--p-fail); }
  .log-tag.system { background: var(--p-text-light); }
  .log-empty {
    text-align: center;
    color: var(--p-text-light);
    padding: 40px 20px;
    font-style: italic;
  }
  #log-footer, #print-footer {
    padding: 12px 18px;
    border-top: 2px dashed #ffd6e2;
    background: #fff8f0;
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .print-intro {
    font-size: 1rem;
    color: var(--p-text);
    margin-bottom: 14px;
    line-height: 1.5;
  }
  .print-week-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 11px 14px;
    margin-bottom: 8px;
    background: #fff;
    border: 2px solid #ffd6e2;
    border-left: 5px solid var(--p-pink);
    border-radius: 12px;
    transition: all 0.2s;
  }
  .print-week-row:hover { background: #fff5fa; transform: translateX(2px); }
  .pw-info { flex: 1; min-width: 0; }
  .pw-title { font-weight: 800; font-family: 'Baloo 2', sans-serif; color: var(--p-text); font-size: 1.05rem; }
  .pw-sub { font-size: 0.85rem; color: var(--p-text-light); }
  .pw-actions { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
  .print-action-btn {
    padding: 6px 12px;
    background: #fff;
    color: var(--p-blue-dark);
    border: 2px solid var(--p-blue);
    border-radius: 10px;
    font-family: 'Baloo 2', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    box-shadow: 0 2px 0 var(--p-blue-dark);
  }
  .print-action-btn:hover { transform: translateY(-1px); box-shadow: 0 3px 0 var(--p-blue-dark); }
  .print-action-btn.full { background: var(--p-blue); color: #fff; }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 22px 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    scroll-behavior: smooth;
    background: linear-gradient(180deg, #fff8f4 0%, #f4f8ff 100%);
  }
  .msg {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    max-width: 92%;
    animation: pop 0.3s ease;
  }
  @keyframes pop {
    from { opacity: 0; transform: translateY(12px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .msg.bot { align-self: flex-start; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .bubble {
    padding: 14px 20px;
    font-size: 1.1rem;
    line-height: 1.55;
    word-wrap: break-word;
    position: relative;
    font-family: 'Fredoka', sans-serif;
  }
  .msg.bot .bubble {
    background: #fff;
    color: var(--p-text);
    border: 2.5px solid var(--p-blue-bright);
    border-radius: 18px 18px 18px 4px;
    box-shadow: 0 3px 0 var(--p-blue), 0 5px 12px rgba(90,192,238,0.12);
    font-weight: 500;
  }
  .msg.user .bubble {
    background: linear-gradient(135deg, var(--p-pink-bright) 0%, var(--p-pink) 100%);
    color: #fff;
    border: 2.5px solid var(--p-pink-dark);
    border-radius: 18px 18px 4px 18px;
    box-shadow: 0 3px 0 var(--p-pink-dark);
    font-weight: 600;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.08);
  }
  .avatar-icon {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    flex-shrink: 0;
    border: 3px solid #fff;
    background: linear-gradient(135deg, var(--p-yellow-bright), var(--p-orange-bright));
    box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    border-radius: 50%;
  }
  .msg.user .avatar-icon {
    background: linear-gradient(135deg, var(--p-purple-bright), var(--p-pink-bright));
  }
  .options {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 14px;
  }
  .option-btn, .topic-btn, .action-btn, .unit-btn {
    padding: 11px 20px;
    border: 2.5px solid var(--p-pink);
    background: #fff;
    color: var(--p-pink-dark);
    border-radius: 14px;
    font-family: 'Baloo 2', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 3px 0 var(--p-pink-dark);
  }
  .option-btn:hover, .topic-btn:hover, .action-btn:hover, .unit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 0 var(--p-pink-dark);
    background: #fff5fa;
  }
  .option-btn.correct {
    background: linear-gradient(180deg, #d0f5c8, #a8e09a);
    color: #2a6020;
    border-color: var(--p-green-dark);
    box-shadow: 0 3px 0 var(--p-green-dark);
  }
  .option-btn.wrong {
    background: linear-gradient(180deg, #ffd0d0, #ffa0a0);
    color: #8a2018;
    border-color: var(--p-fail);
    box-shadow: 0 3px 0 var(--p-fail);
  }
  .option-btn:disabled, .option-btn.correct:disabled, .option-btn.wrong:disabled { cursor: not-allowed; opacity: 0.92; }

  /* Letter buttons for Part A (fill missing letter) */
  .letter-btn {
    padding: 14px 22px;
    font-size: 1.6rem;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    min-width: 64px;
    text-align: center;
    text-transform: lowercase;
    letter-spacing: 0.05em;
  }

  /* Unit/Week selection grid */
  .unit-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
    margin-top: 14px;
  }
  .unit-btn {
    padding: 18px 12px;
    text-align: center;
    font-size: 0.95rem;
    line-height: 1.4;
  }
  .unit-btn.w25 { border-color: var(--p-pink); color: var(--p-pink-dark); box-shadow: 0 3px 0 var(--p-pink-dark); }
  .unit-btn.w26 { border-color: var(--p-blue); color: var(--p-blue-dark); box-shadow: 0 3px 0 var(--p-blue-dark); }
  .unit-btn.w27 { border-color: var(--p-yellow-dark); color: var(--p-yellow-dark); box-shadow: 0 3px 0 var(--p-yellow-dark); }
  .unit-btn.w28 { border-color: var(--p-green); color: var(--p-green-dark); box-shadow: 0 3px 0 var(--p-green-dark); }
  .unit-btn.w29 { border-color: var(--p-purple); color: var(--p-purple-dark); box-shadow: 0 3px 0 var(--p-purple-dark); }
  .unit-btn.w30 { border-color: var(--p-orange); color: var(--p-orange-dark); box-shadow: 0 3px 0 var(--p-orange-dark); }
  .unit-btn.w31 { border-color: var(--p-pink-dark); color: var(--p-pink-dark); box-shadow: 0 3px 0 var(--p-pink-dark); }
  .unit-btn.w32 { border-color: var(--p-blue-dark); color: var(--p-blue-dark); box-shadow: 0 3px 0 var(--p-blue-dark); }
  .unit-emoji { font-size: 2.2rem; display: block; margin-bottom: 6px; }
  .unit-title { font-size: 1rem; display: block; margin-bottom: 3px; font-weight: 800; }
  .unit-sub { font-size: 0.78rem; opacity: 0.85; display: block; }

  /* Topic grid */
  .topic-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
    margin-top: 12px;
  }
  .topic-btn {
    text-align: center;
    padding: 14px 10px;
    font-size: 0.92rem;
    line-height: 1.3;
    color: var(--p-purple-dark);
    border-color: var(--p-purple);
    box-shadow: 0 3px 0 var(--p-purple-dark);
  }
  .topic-btn:hover { box-shadow: 0 5px 0 var(--p-purple-dark); }
  .topic-emoji { font-size: 1.6rem; display: block; margin-bottom: 5px; }

  #input-area {
    display: flex;
    gap: 10px;
    padding: 16px;
    background: #fff;
    border-top: 3px dashed #ffd6e2;
  }
  #user-input {
    flex: 1;
    padding: 12px 18px;
    border: 2.5px solid var(--p-pink-bright);
    background: var(--p-cream);
    color: var(--p-text);
    border-radius: 14px;
    font-family: 'Fredoka', sans-serif;
    font-size: 1.05rem;
    outline: none;
  }
  #user-input:focus {
    border-color: var(--p-pink);
    box-shadow: 0 0 0 4px rgba(255,143,184,0.18);
    background: #fff;
  }
  #user-input::placeholder { color: #d0a8b8; font-style: italic; }
  #send-btn {
    padding: 11px 24px;
    background: linear-gradient(180deg, var(--p-pink-bright) 0%, var(--p-pink) 100%);
    color: #fff;
    border: 2.5px solid var(--p-pink-dark);
    border-radius: 14px;
    font-family: 'Baloo 2', sans-serif;
    font-size: 1.05rem;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 3px 0 var(--p-pink-dark);
    text-shadow: 1px 1px 0 rgba(0,0,0,0.12);
  }
  #send-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 0 var(--p-pink-dark);
  }

  .lesson-content {
    background: linear-gradient(135deg, #fff8e8, #fff5d0);
    color: var(--p-text);
    border: 2.5px solid var(--p-yellow);
    border-radius: 14px;
    padding: 14px 18px;
    margin-top: 10px;
    font-family: 'Fredoka', sans-serif;
    box-shadow: 0 3px 0 var(--p-yellow-dark);
  }
  .lesson-content strong { color: var(--p-orange-dark); font-family: 'Baloo 2', sans-serif; font-weight: 800; }
  .lesson-content .sound { color: var(--p-pink-dark); font-weight: 700; font-size: 1.15em; }

  .word-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 8px;
    margin-top: 12px;
  }
  .word-card {
    background: #fff;
    border: 2px solid var(--p-blue-bright);
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
    font-family: 'Baloo 2', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--p-blue-dark);
    box-shadow: 0 2px 0 var(--p-blue);
  }
  .word-card.spelling { border-color: var(--p-pink-bright); color: var(--p-pink-dark); box-shadow: 0 2px 0 var(--p-pink); }
  .word-card.high-freq { border-color: var(--p-purple-bright); color: var(--p-purple-dark); box-shadow: 0 2px 0 var(--p-purple); }

  .feedback-correct {
    background: linear-gradient(135deg, #e8fbe0, #d0f5c8);
    color: #1a4828;
    border: 2.5px solid var(--p-green);
    border-radius: 14px;
    padding: 12px 16px;
    margin-top: 8px;
    font-family: 'Fredoka', sans-serif;
    font-size: 1.05rem;
    box-shadow: 0 3px 0 var(--p-green-dark);
  }
  .feedback-wrong {
    background: linear-gradient(135deg, #ffeee8, #ffd8d0);
    color: #6a2018;
    border: 2.5px solid var(--p-fail);
    border-radius: 14px;
    padding: 12px 16px;
    margin-top: 8px;
    font-family: 'Fredoka', sans-serif;
    font-size: 1.05rem;
    box-shadow: 0 3px 0 var(--p-fail);
  }

  /* Quiz word display (for Part A — show partial word + blank) */
  .quiz-word-display {
    background: #fff;
    border: 3px dashed var(--p-pink);
    border-radius: 14px;
    padding: 18px 24px;
    text-align: center;
    margin: 14px 0;
    font-family: 'Baloo 2', sans-serif;
    font-size: 2.4rem;
    font-weight: 800;
    color: var(--p-text);
    letter-spacing: 0.18em;
    box-shadow: 0 3px 0 var(--p-pink-dark);
  }
  .quiz-word-display .blank {
    color: var(--p-pink-dark);
    background: #ffe0ec;
    padding: 0 6px;
    border-radius: 6px;
    border: 2px dashed var(--p-pink-dark);
  }
  .quiz-word-display .hint {
    display: block;
    font-size: 1rem;
    font-weight: 500;
    color: var(--p-text-light);
    margin-top: 8px;
    letter-spacing: normal;
  }

  /* Sentence with blank for Part B */
  .quiz-sentence {
    background: #f4faff;
    border: 2.5px solid var(--p-blue-bright);
    border-radius: 12px;
    padding: 14px 18px;
    margin: 12px 0;
    font-family: 'Fredoka', sans-serif;
    font-size: 1.15rem;

/* ================================================================
   DOM helpers
   ================================================================ */

const chat = document.getElementById('chat');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const scoreEl = document.getElementById('score');
const unitBadge = document.getElementById('unit-badge');

function pad(n) { return n.toString().padStart(2, '0'); }
function nowStr() {
  const d = new Date();
  return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

function makeMsgEl(kind) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + kind;
  const av = document.createElement('div');
  av.className = 'avatar-icon';
  av.innerHTML = kind === 'bot' ? '🦉' : '🌟';
  const bub = document.createElement('div');
  bub.className = 'bubble';
  wrap.appendChild(av);
  wrap.appendChild(bub);
  return { wrap, bub };
}

function botSay(html, options) {
  const { wrap, bub } = makeMsgEl('bot');
  bub.innerHTML = html;
  if (options && options.length) {
    const optsWrap = document.createElement('div');
    optsWrap.className = 'options';
    options.forEach(opt => {
      const b = document.createElement('button');
      b.className = opt.cls || 'option-btn';
      b.innerHTML = opt.label;
      b.onclick = () => opt.onClick(b);
      optsWrap.appendChild(b);
    });
    bub.appendChild(optsWrap);
  }
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  // log
  const plain = bub.innerText.slice(0, 240);
  state.log.push({ time: nowStr(), kind: 'bot', text: plain });
}

function userSay(text) {
  const { wrap, bub } = makeMsgEl('user');
  bub.textContent = text;
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  state.log.push({ time: nowStr(), kind: 'user', text });
}

function addStars(n) {
  state.score += n;
  scoreEl.textContent = state.score;
  scoreEl.parentElement.style.transform = 'scale(1.18)';
  setTimeout(() => scoreEl.parentElement.style.transform = 'scale(1)', 250);
}

function logAnswer(correct, q, chosen, right, explain) {
  state.totalAnswered++;
  if (correct) state.totalCorrect++;
  state.log.push({
    time: nowStr(),
    kind: correct ? 'correct' : 'wrong',
    text: `${correct ? '✅' : '❌'} Q: ${stripTags(q).slice(0,180)} | You: ${chosen} | Answer: ${right}`
  });
}

function stripTags(s) {
  const tmp = document.createElement('div');
  tmp.innerHTML = s;
  return tmp.textContent || tmp.innerText || '';
}

   FLOW: Welcome → Week menu → Topic menu → Lesson / Quiz
   ================================================================ */

function showWelcome() {
  state.mode = 'welcome';
  unitBadge.style.display = 'none';
  botSay(
    "Hi friend! 🦉 I'm <strong>Buddy the Owl</strong>, your reading and phonics helper! 🌟<br><br>" +
    "What would you like to do today?<br>" +
    "📚 <strong>Phonics weeks</strong> — learn new sounds and play fun quizzes.<br>" +
    "📖 <strong>Reading units</strong> — read a story, learn new words, and try spelling and usage quizzes!",
    [
      { label: "📚 Phonics (Weeks 25–32)", onClick: () => { userSay("Phonics weeks"); showWeekMenu(); } },
      { label: "📖 Reading (Units 23–24)", onClick: () => { userSay("Reading units"); showReadingMenu(); } }
    ]
  );
}

function showWeekMenu() {
  state.mode = 'week_menu';
  state.currentWeek = null;
  unitBadge.style.display = 'none';
  let html = "<strong>📚 Pick your week!</strong><br>Each week has new sounds to learn.<div class='unit-grid'>";
  Object.entries(WEEKS).forEach(([key, w]) => {
    html += `<button class='unit-btn ${w.cssClass}' onclick='pickWeek("${key}")'>` +
      `<span class='unit-emoji'>${w.emoji}</span>` +
      `<span class='unit-title'>${w.title}</span>` +
      `<span class='unit-sub'>${w.subtitle}</span>` +
      `</button>`;
  });
  html += "</div>";
  botSay(html, [
    { label: "📖 Switch to Reading Units", onClick: () => { userSay("Reading units"); showReadingMenu(); } }
  ]);
}

window.pickWeek = function(key) {
  state.currentWeek = key;
  const w = WEEKS[key];
  userSay(`Let's do ${w.title}!`);
  unitBadge.textContent = `${w.emoji} ${w.title}`;
  unitBadge.style.display = 'inline-block';
  showTopicMenu();
};

function showTopicMenu() {
  state.mode = 'topic_menu';
  const w = WEEKS[state.currentWeek];
  let html = `<strong>${w.emoji} ${w.title}: ${w.subtitle}</strong><br>What would you like to do?`;
  botSay(html, [
    { label: "📖 Learn the words", onClick: () => { userSay("Learn the words"); showLesson(); } },
    { label: "✏️ Quiz: Missing letter", onClick: () => { userSay("Quiz: Missing letter"); startQuiz('A'); } },
    { label: "📝 Quiz: Best word", onClick: () => { userSay("Quiz: Best word"); startQuiz('B'); } },
    { label: "🎵 Quiz: Same vowel sound", onClick: () => { userSay("Quiz: Same vowel sound"); startQuiz('C'); } },
    { label: "🔄 Pick another week", onClick: () => { userSay("Pick another week"); showWeekMenu(); } }
  ]);
}

function showLesson() {
  state.mode = 'lesson';
  const w = WEEKS[state.currentWeek];
  let html = `<strong>${w.emoji} ${w.title} — Sound-Spelling</strong>`;
  html += `<div class='lesson-content'>This week we'll learn about:<br><br>`;
  w.sounds.forEach(s => { html += `🔹 ${s}<br>`; });
  html += `</div>`;

  // Spelling words
  html += `<br><strong>📘 Spelling Words</strong>`;
  html += `<div class='word-grid'>`;
  w.spelling.forEach(word => { html += `<div class='word-card spelling'>${word}</div>`; });
  html += `</div>`;

  // High-frequency words
  html += `<br><strong>⭐ High-Frequency Words</strong>`;
  html += `<div class='word-grid'>`;
  w.highFreq.forEach(word => { html += `<div class='word-card high-freq'>${word}</div>`; });
  html += `</div>`;

  // Families
  html += `<br><strong>🌈 Words by Sound</strong>`;
  Object.entries(w.families).forEach(([family, words]) => {

function shuffle(arr) { return arr.slice().sort(() => Math.random() - 0.5); }

function buildPartAQuestions(week) {
  // Each item -> a question: word with one or two letters blanked.
  // Options = correct letter(s) + 3 distractor single letters or pairs.
  const w = WEEKS[week];
  return shuffle(w.partA).map(item => {
    const word = item.word;
    const blanks = item.blanks; // indices that are hidden
    // Build display: e.g. "p__w"
    const display = word.split('').map((c, i) => blanks.includes(i) ? `<span class='blank'>_</span>` : c).join(' ');
    // The "answer" is the letters at the blank positions, in order
    const correctLetters = blanks.map(i => word[i]).join('');

    // Build distractors:
    // For 1-letter blanks, distractors = other vowels/consonants
    // For 2-letter blanks, common pairs from this week
    const distractorPool = [];
    if (correctLetters.length === 1) {
      distractorPool.push(...['a','e','i','o','u','b','c','d','f','g','h','k','l','m','n','p','r','s','t','w','y']);
    } else if (correctLetters.length === 2) {
      // Generate from common digraphs and pairs in this week
      const pool = ['aw','au','ay','ai','ow','ou','oo','ee','ea','oi','oy','ie','ew','ue',
                    'al','ar','er','ir','or','ur','ll','le','ck','sh','ch','th','wh','ng','nt',
                    'ld','lt','lk','rt','rd','rn','st','rk','rm','sw','sn','sl','sp','sk',
                    'br','cr','dr','fr','gr','pr','tr','bl','cl','fl','gl','pl','tw'];
      distractorPool.push(...pool);
    } else {
      // 3+ letters — fall back to tricky shuffles of the correct letters
      distractorPool.push(...['oat','ick','ing','ish','ock','ound','ight','one','ame','ake']);
    }
    const distractors = shuffle(distractorPool.filter(x => x !== correctLetters)).slice(0, 3);
    const options = shuffle([correctLetters, ...distractors]);
    const answer = options.indexOf(correctLetters);

    return {
      type: 'A',
      q: `<strong>Fill in the missing letter${blanks.length > 1 ? 's' : ''}!</strong>` +
         `<div class='quiz-word-display'>${display}<span class='hint'>${item.pictureHint}</span></div>` +
         `Pick the right letter${blanks.length > 1 ? 's' : ''}:`,
      options,
      answer,
      explain: `The word is <strong>${word}</strong>! The missing letter${blanks.length > 1 ? 's are' : ' is'} <strong>${correctLetters}</strong>.`,
      word
    };
  });
}

function buildPartBQuestions(week) {
  const w = WEEKS[week];
  return shuffle(w.partB).map(item => {
    const sent = item.sentence.replace('___', `<span class='blank'>____</span>`);
    const options = shuffle(item.choices);
    const answer = options.indexOf(item.correct);
    const filled = item.sentence.replace('___', `<strong>${item.correct}</strong>`);
    return {
      type: 'B',
      q: `<strong>Pick the best word for the sentence:</strong>` +
         `<div class='quiz-sentence'>${sent}</div>`,
      options,
      answer,
      explain: `Great! The sentence is: <em>"${filled}"</em>`,
      word: item.correct
    };
  });
}

function buildPartCQuestions(week) {
  const w = WEEKS[week];
  return shuffle(w.partC).map(item => {
    const sortedSame = item.sameSound.slice().sort();
    const display = item.words.map(x => `<span class='vw'>${x}</span>`).join('');
    // Build the option set: each option is a pair from item.words.
    // We need exactly one correct pair.
    const allPairs = [];
    for (let i = 0; i < item.words.length; i++) {
      for (let j = i+1; j < item.words.length; j++) {
        allPairs.push([item.words[i], item.words[j]].sort());
      }
    }
    const options = shuffle(allPairs).map(p => p.join(' & '));
    const correctLabel = sortedSame.join(' & ');
    const answer = options.indexOf(correctLabel);
    return {
      type: 'C',
      q: `<strong>Which two words have the same vowel sound?</strong>` +
         `<div class='quiz-vowel-words'>${display}</div>` +
         `Choose the matching pair:`,
      options,
      answer,
      explain: `Yes! <strong>${sortedSame.join('</strong> and <strong>')}</strong> share the same vowel sound. 🎵`,
      word: correctLabel
    };
  });
}

function startQuiz(part) {
  state.mode = 'quiz';
  state.quizType = part;
  state.quizIndex = 0;
  state.quizCorrect = 0;
  if (part === 'A') state.quizQuestions = buildPartAQuestions(state.currentWeek);
  else if (part === 'B') state.quizQuestions = buildPartBQuestions(state.currentWeek);
  else state.quizQuestions = buildPartCQuestions(state.currentWeek);
  const w = WEEKS[state.currentWeek];
  const partName = part === 'A' ? 'Missing Letter Quiz' : part === 'B' ? 'Best Word Quiz' : 'Same Vowel Sound Quiz';
  botSay(
    `<strong>🎯 ${partName} — ${w.title}</strong><br>` +
    `<em>Get ready! There are ${state.quizQuestions.length} questions. Earn 1 ⭐ for each right answer!</em>`
  );

}

function askQuestion() {
  const item = state.quizQuestions[state.quizIndex];
  let html = `<strong>Question ${state.quizIndex + 1} of ${state.quizQuestions.length}</strong><br><br>${item.q}`;
  const opts = item.options.map((opt, idx) => ({
    label: opt,
    cls: (item.type === 'A' && opt.length <= 4) ? 'option-btn letter-btn' : 'option-btn',
    onClick: (btn) => handleAnswer(idx, btn)
  }));
  botSay(html, opts);

function handleAnswer(chosen, btn) {
  const item = state.quizQuestions[state.quizIndex];
  const allBtns = btn.parentElement.querySelectorAll('button');
  allBtns.forEach(b => b.disabled = true);
  userSay(item.options[chosen]);
  const isCorrect = chosen === item.answer;
  if (isCorrect) {

    state.quizCorrect++;
    addStars(1);
    botSay(`<div class='feedback-correct'>🎉 <strong>Yes!</strong> ${item.explain}<br><em>+1 ⭐ star!</em></div>`);
  } else {

  setTimeout(() => {

  else if (got >= total / 2) msg = `⭐ <strong>Nice work!</strong> ${got} of ${total} correct. Bonus +${bonus} ⭐. <em>Try again to earn more!</em>`;
  else msg = `You got ${got} of ${total}. <em>Let's read the words again — practice makes perfect!</em>`;
  if (bonus) addStars(bonus);
  botSay(msg, [
    { label: "🔁 Try again", onClick: () => { userSay("Try again"); startQuiz(state.quizType); } },
    { label: "✏️ Missing-letter quiz", onClick: () => { userSay("Missing-letter quiz"); startQuiz('A'); } },

/* --- Misspelling generators for "pick the correct spelling" questions --- */
function generateMisspellings(word) {
  const vowels = ['a','e','i','o','u'];
  const candidates = new Set();

  // 1. Swap a vowel for another vowel
  for (let i = 0; i < word.length; i++) {
    if (vowels.includes(word[i])) {
      for (const v of vowels) {
        if (v !== word[i]) candidates.add(word.slice(0, i) + v + word.slice(i + 1));
      }
    }
  }
  // 2. Drop a single letter (not the first)
  for (let i = 1; i < word.length; i++) {
    candidates.add(word.slice(0, i) + word.slice(i + 1));
  }
  // 3. Double a consonant (or un-double doubled letters)
  for (let i = 1; i < word.length - 1; i++) {
    const c = word[i];
    if (!vowels.includes(c) && word[i - 1] !== c && word[i + 1] !== c) {
      candidates.add(word.slice(0, i) + c + word.slice(i));
    }
    if (word[i] === word[i - 1]) {
      candidates.add(word.slice(0, i) + word.slice(i + 1));
    }
  }
  // 4. Swap two adjacent letters
  for (let i = 0; i < word.length - 1; i++) {
    if (word[i] !== word[i + 1]) {
      candidates.add(word.slice(0, i) + word[i + 1] + word[i] + word.slice(i + 2));
    }
  }
  // 5. Word-specific phonetic confusions for our target vocab
  const phonetic = {
    "house":    ["howse","hous","huose","hause"],
    "along":    ["alung","alon","allong","aloung"],
    "together": ["togethr","togather","togeather","togeter"],
    "boy":      ["boi","bouy","boye","bui"],
    "father":   ["fadher","fothar","feather","fater"],
    "again":    ["agen","agian","agane","agin"],
    "nothing":  ["nuthing","nothig","nothink","noting"],
    "began":    ["bagan","beggin","beggan","began"].filter(x=>x!=="began").concat(["bagun","bigan"]),
    "kinds":    ["kindz","kinds".replace('i','y'),"kindes","kins"],
    "earth":    ["erth","earht","earthe","urth"],
    "country":  ["contry","cuntry","countree","contery"],
    "almost":   ["allmost","almoste","almoast","almst"],
    "warms":    ["wormz","warmes","wamrs","warmms"],
    "ready":    ["redy","raedy","reddy","reaty"],
    "soil":     ["sol","siol","soyl","soill"],
    "covers":   ["cuvers","coverz","covrs","kovers"]
  };
  if (phonetic[word]) phonetic[word].forEach(x => candidates.add(x));

  // Filter out the correct word
  candidates.delete(word);
  return Array.from(candidates);
}

function buildSpellingQuestions(unitKey) {
  const u = READING_UNITS[unitKey];
  // For each vocab item, randomly pick one of two question styles.
  return shuffle(u.spelling).map(item => {
    const word = item.word;
    const useMissingLetter = Math.random() < 0.5;

    if (useMissingLetter) {
      // ----- Style 1: Fill the missing letter(s) -----
      const blanks = item.blanks;
      const display = word.split('').map((c, i) => blanks.includes(i) ? `<span class='blank'>_</span>` : c).join(' ');
      const correctLetters = blanks.map(i => word[i]).join('');

      const distractorPool = [];
      if (correctLetters.length === 1) {
        distractorPool.push(...['a','e','i','o','u','b','c','d','f','g','h','k','l','m','n','p','r','s','t','w','y']);
      } else if (correctLetters.length === 2) {
        distractorPool.push(...['ou','ho','ng','lo','to','ge','th','er','bo','oy','fa','ai','in','ag','no','th','be','ki','nd','ea','rt','co','un','tr','al','mo','st','wa','rm','re','ad','so','il','ve','rs','an','en']);
      } else {
        distractorPool.push(...['ouse','long','ther','ing','her','gain','hing','egan','arth','untry','arms','eady']);
      }
      const distractors = shuffle(distractorPool.filter(x => x !== correctLetters)).slice(0, 3);
      const options = shuffle([correctLetters, ...distractors]);
      const answer = options.indexOf(correctLetters);

      return {
        type: 'SPELL',
        q: `<strong>Spell the word!</strong> Pick the missing letter${blanks.length > 1 ? 's' : ''}:` +
           `<div class='quiz-word-display'>${display}<span class='hint'>${item.hint}</span></div>`,
        options,
        answer,
        explain: `The word is <strong>${word}</strong>. The missing letter${blanks.length > 1 ? 's are' : ' is'} <strong>${correctLetters}</strong>.`,
        word
      };
    } else {
      // ----- Style 2: Pick the correctly-spelled word -----
      const misspellings = shuffle(generateMisspellings(word)).slice(0, 3);
      // Make sure we always have exactly 3 distractors; pad if needed.
      while (misspellings.length < 3) {
        // Fallback: random vowel swap
        const v = ['a','e','i','o','u'];
        const idx = Math.floor(Math.random() * word.length);
        const swap = word.slice(0, idx) + v[Math.floor(Math.random()*5)] + word.slice(idx + 1);
        if (swap !== word && !misspellings.includes(swap)) misspellings.push(swap);
        else misspellings.push(word + 'e');
      }
      const options = shuffle([word, ...misspellings]);
      const answer = options.indexOf(word);
      return {
        type: 'SPELL_PICK',
        q: `<strong>Pick the correct spelling!</strong>` +
           `<div class='quiz-sentence' style='text-align:center;font-size:1.1rem;'>${item.hint}</div>` +
           `Which one is spelled right?`,
        options,
        answer,
        explain: `Yes! The correct spelling is <strong>${word}</strong>.`,
        word
      };
    }
  });
}

    { label: "🔁 Try the same quiz", onClick: () => { userSay("Try again"); startReadingQuiz(state.quizType); } },
    { label: "✏️ Spelling quiz", onClick: () => { userSay("Spelling quiz"); startReadingQuiz('spelling'); } },
    { label: "📝 Word usage quiz", onClick: () => { userSay("Word usage quiz"); startReadingQuiz('usage'); } },
    { label: "❓ Reading questions", onClick: () => { userSay("Reading questions"); startReadingQuiz('comprehension'); } },
    { label: "📖 Re-read the story", onClick: () => { userSay("Re-read the story"); showReadingPassage(); } },
    { label: "🔄 Pick another unit", onClick: () => { userSay("Pick another unit"); showReadingMenu(); } }
  ]);
}

/* ================================================================
   LOG OVERLAY
   ================================================================ */

const logOverlay = document.getElementById('log-overlay');
const logBody = document.getElementById('log-body');

function openLog() {
  // stats
  document.getElementById('log-stat-correct').textContent = state.totalCorrect;
  document.getElementById('log-stat-total').textContent = state.totalAnswered;
  document.getElementById('log-stat-pct').textContent = state.totalAnswered ? Math.round(100 * state.totalCorrect / state.totalAnswered) + '%' : '—';
  document.getElementById('log-stat-honour').textContent = state.score;
  // body
  if (state.log.length === 0) {
    logBody.innerHTML = `<div class='log-empty'>No log yet. Start chatting with Buddy! 🦉</div>`;
  } else {
    logBody.innerHTML = state.log.map(e => {
      const tag = e.kind === 'bot' ? 'Buddy' : e.kind === 'user' ? 'You' : e.kind === 'correct' ? '✓ Correct' : e.kind === 'wrong' ? '✗ Wrong' : 'System';
      return `<div class='log-entry ${e.kind}'><span class='log-time'>${e.time}</span><span class='log-tag ${e.kind}'>${tag}</span>${escapeHtml(e.text)}</div>`;
    }).join('');
  }
  logOverlay.classList.add('open');
}
function closeLog() { logOverlay.classList.remove('open'); }

function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

document.getElementById('log-btn').onclick = openLog;
document.getElementById('log-close').onclick = closeLog;
document.getElementById('log-close-2').onclick = closeLog;
document.getElementById('log-clear').onclick = () => {
  if (confirm('Clear all log entries? This will reset your stats too.')) {
    state.log = []; state.totalAnswered = 0; state.totalCorrect = 0;
    openLog();
  }
};
document.getElementById('log-export').onclick = () => {
  // Export to xlsx
  const rows = [['Time', 'Kind', 'Message']];
  state.log.forEach(e => rows.push([e.time, e.kind, e.text]));
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Phonics Log');
  XLSX.writeFile(wb, `phonics-log-${new Date().toISOString().slice(0,10)}.xlsx`);
};

/* ================================================================
   INPUT HANDLING
   ================================================================ */

function handleSend() {
  const text = userInput.value.trim();
  if (!text) return;
  userSay(text);
  userInput.value = '';
  // Friendly fallback — encourage button use
  setTimeout(() => {
    const opts = [
      { label: "📚 Phonics weeks", onClick: () => { userSay("Phonics weeks"); showWeekMenu(); } },
      { label: "📖 Reading units", onClick: () => { userSay("Reading units"); showReadingMenu(); } }
    ];
    if (state.currentWeek) {
      opts.push({ label: "📖 Re-read this week's words", onClick: () => { userSay("Re-read words"); showLesson(); } });
    }
    if (state.currentUnit) {
      opts.push({ label: "📖 Re-read this story", onClick: () => { userSay("Re-read story"); showReadingPassage(); } });
    }
    opts.push({ label: "🏠 Start over", onClick: () => { userSay("Start over"); showWelcome(); } });
    botSay("Tap one of the buttons to keep going! 🌟", opts);
  }, 250);
}

sendBtn.onclick = handleSend;
userInput.addEventListener('keypress', e => { if (e.key === 'Enter') handleSend(); });
